# =============================================================================
# Apache VirtualHost configuration for untivitti
# Copy this file to: /etc/apache2/sites-available/untivitti.ammiratafabiano.dev.conf
#
# Prerequisites:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite ssl headers
#   sudo certbot --apache -d untivitti.ammiratafabiano.dev
#   sudo systemctl restart apache2
# =============================================================================

<VirtualHost *:80>
    ServerName untivitti.ammiratafabiano.dev

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =untivitti.ammiratafabiano.dev
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName untivitti.ammiratafabiano.dev

        ProxyPreserveHost On
        SSLProxyEngine On

        # ==========================
        # Backend HTTP API
        # ==========================
        ProxyPass /api/ http://127.0.0.1:3442/
        ProxyPassReverse /api/ http://127.0.0.1:3442/

        # ==========================
        # Backend WebSocket
        # ==========================
        ProxyPass /ws ws://127.0.0.1:3442/
        ProxyPassReverse /ws ws://127.0.0.1:3442/

        # ==========================
        # Frontend (Ionic static app)
        # ==========================
        ProxyPass / http://127.0.0.1:8081/
        ProxyPassReverse / http://127.0.0.1:8081/

        RequestHeader set X-Forwarded-Proto "https"

        SSLCertificateFile /etc/letsencrypt/live/untivitti.ammiratafabiano.dev/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/untivitti.ammiratafabiano.dev/privkey.pem
        Include /etc/letsencrypt/options-ssl-apache.conf
    </VirtualHost>
</IfModule>
